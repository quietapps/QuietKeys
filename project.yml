name: QuietKeys
options:
  bundleIdPrefix: app.quiet
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: true
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "3"

targets:
  QuietKeys:
    type: application
    platform: macOS
    sources:
      - path: QuietKeys
        excludes:
          - "Resources/Profiles/**"
      - path: QuietKeys/Resources/Profiles
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quiet.QuietKeys
        PRODUCT_NAME: Quiet Keys
        SWIFT_OBJC_BRIDGING_HEADER: QuietKeys/Support/QuietKeys-Bridging-Header.h
        INFOPLIST_KEY_LSUIElement: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT License — Quiet Apps"
        INFOPLIST_KEY_CFBundleDisplayName: "Quiet Keys"
