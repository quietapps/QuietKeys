name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Import signing certificate
        # Only when secrets are configured (skipped on forks / PRs).
        if: startsWith(github.ref, 'refs/tags/v') && secrets.MACOS_CERTIFICATE_P12 != ''
        env:
          CERT: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERT_PW: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT" | base64 --decode > cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain \
            -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain
          echo "SIGN_IDENTITY=Developer ID Application" >> "$GITHUB_ENV"

      - name: Build
        run: |
          IDENTITY="${SIGN_IDENTITY:--}"
          xcodebuild -project QuietKeys.xcodeproj -scheme QuietKeys \
            -configuration Release -derivedDataPath build \
            CODE_SIGN_IDENTITY="$IDENTITY" build

      - name: Package DMG
        run: |
          APP="build/Build/Products/Release/Quiet Keys.app"
          mkdir -p dist/dmg
          cp -R "$APP" dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "Quiet Keys" -srcfolder dist/dmg \
            -ov -format UDZO "dist/QuietKeys.dmg"

      - name: Notarize
        if: startsWith(github.ref, 'refs/tags/v') && secrets.NOTARY_APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          APP_PW: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool submit dist/QuietKeys.dmg \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" \
            --password "$APP_PW" --wait
          xcrun stapler staple dist/QuietKeys.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuietKeys.dmg
          path: dist/QuietKeys.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/QuietKeys.dmg
          generate_release_notes: true
